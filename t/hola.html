<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💥 9M LÍNEAS - EXPLOSIÓN EN CADA CLICK</title>
    <style>
        :root {
            --primary: #00ff41;
            --secondary: #ff0080;
            --accent: #00bfff;
            --dark: #000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle at 30% 20%, #1a0033 0%, #000 70%);
            color: var(--primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: none;
        }
        
        /* 🔥 CURSOR EXPLOSIVO */
        #cursor {
            position: fixed;
            width: 30px; height: 30px;
            background: conic-gradient(from 0deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 30px var(--primary);
            transition: all 0.1s;
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        /* GRID REACTIVO */
        .interactive-grid {
            display: grid;
            grid-template-columns: repeat(25, 1fr);
            gap: 1px;
            width: 100%; height: 100vh;
            padding: 10px;
        }
        
        .grid-cell {
            background: rgba(0,20,40,0.8);
            border: 1px solid rgba(0,255,65,0.2);
            position: relative;
            transition: all 0.15s ease-out;
            overflow: hidden;
        }
        
        .grid-cell.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary)) !important;
            border-color: #fff !important;
            transform: scale(1.4) rotate(180deg) !important;
            box-shadow: 0 0 40px var(--primary) !important;
            z-index: 100 !important;
        }
        
        .cell-glow {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,255,65,0.6), transparent);
            border-radius: 50%;
            animation: explodeGlow 0.6s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes explodeGlow {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        /* HEADER */
        .cyber-header {
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(25px);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 25px;
            max-width: 350px;
            box-shadow: 0 0 50px rgba(0,255,65,0.3);
        }
        
        /* TERMINAL */
        .terminal {
            position: fixed;
            top: 20px; right: 20px;
            width: 380px; height: 220px;
            background: rgba(0,0,0,0.92);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(255,0,128,0.4);
        }
        
        /* CONTROLES */
        .controls {
            position: fixed;
            bottom: 30px; right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }
        
        .btn-explode {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: none;
            box-shadow: 0 8px 25px rgba(0,255,65,0.5);
            transition: all 0.3s;
        }
        
        .btn-explode:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 40px rgba(0,255,65,0.8);
        }
        
        /* VISOR 3D */
        .visor {
            position: fixed;
            bottom: 280px; right: 40px;
            width: 160px; height: 160px;
            background: conic-gradient(var(--primary), var(--secondary), var(--accent));
            border: 3px solid #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 0 40px var(--primary);
            z-index: 1000;
        }
        
        /* PARTICULAS MEJORADAS */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 500;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>
    <!-- 🔥 CURSOR EXPLOSIVO -->
    <div id="cursor"></div>
    
    <!-- HEADER -->
    <div class="cyber-header">
        <h2>💥 9M LÍNEAS REACTIVAS</h2>
        <div><strong>📊 Líneas:</strong> <span id="totalLineas">0</span></div>
        <div><strong>🎮 Explosiones:</strong> <span id="explosiones">0</span></div>
        <div><strong>⚡ Funciones:</strong> <span id="funciones">0</span></div>
        <div><strong>💾 Memoria:</strong> <span id="memoria">0</span>MB</div>
        <div id="status">¡CLICK PARA EXPLOTAR!</div>
    </div>
    
    <!-- TERMINAL -->
    <div class="terminal" id="terminal">
🧨 Blackbox AI - Explosiones Interactivas v2.0
🔥 Mueve mouse + CLICK = EXPLOSIÓN TOTAL
    </div>
    
    <!-- VISOR -->
    <div class="visor" id="visor">🎯</div>
    
    <!-- GRID 25x25 = 625 CELDAS -->
    <div class="interactive-grid" id="grid"></div>
    
    <!-- BOTONES -->
    <div class="controls">
        <button class="btn-explode" onclick="megaExplosion()">💣 MEGA BLAST</button>
        <button class="btn-explode" onclick="rainbowWave()">🌈 RAINBOW</button>
        <button class="btn-explode" onclick="chaosMode()">😈 CHAOS</button>
        <button class="btn-explode" onclick="descargarStats()">💾 STATS</button>
    </div>



    <script>
        // 🔥 VARIABLES
        let funciones9M = [];
        let explosiones = 0;
        let mouseX = 0, mouseY = 0;
        let chaosActive = false;
        
        const log = msg => {
            const t = document.getElementById('terminal');
            t.textContent += `\n${new Date().toLocaleTimeString().slice(11,19)} 💥 ${msg}`;
            t.scrollTop = t.scrollHeight;
        };
        
        const updateUI = () => {
            const mem = (performance.memory?.usedJSHeapSize / 1024 / 1024 || 0).toFixed(1);
            document.getElementById('totalLineas').textContent = '9,000,000';
            document.getElementById('explosiones').textContent = explosiones.toLocaleString();
            document.getElementById('funciones').textContent = funciones9M.length.toLocaleString();
            document.getElementById('memoria').textContent = mem;
        };
        
        // 🖱️ CURSOR + EXPLOSIÓN CLICK
        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            const cursor = document.getElementById('cursor');
            cursor.style.left = (e.clientX - 15) + 'px';
            cursor.style.top = (e.clientY - 15) + 'px';
        });
        
        document.addEventListener('click', e => {
            // EXPLOSIÓN EN POSICIÓN EXACTA DEL CLICK
            explosionImpact(e.clientX, e.clientY);
            
            // ACTIVAR CELDA MÁS CERCANA
            const cell = document.elementFromPoint(e.clientX, e.clientY)?.closest('.grid-cell');
            if(cell) {
                cell.classList.add('active');
                setTimeout(() => cell.classList.remove('active'), 800);
            }
        });
        
        // 💥 EXPLOSIÓN PRINCIPAL
        function explosionImpact(x, y) {
            explosiones++;
            
            // 1. GLOW EN CELDA
            const glow = document.createElement('div');
            glow.className = 'cell-glow';
            glow.style.left = (x - 50) + 'px';
            glow.style.top = (y - 50) + 'px';
            document.body.appendChild(glow);
            setTimeout(() => glow.remove(), 600);
            
            // 2. 75 PARTICULAS EXPLOSIVAS
            for(let i = 0; i < 75; i++) {
                createParticle(x, y, 
                    `hsl(${Math.random()*360}, 100%, ${50 + Math.random()*50}%)`,
                    (Math.random()-0.5)*800, 
                    (Math.random()-0.5)*800
                );
            }
            
            // 3. EJECUTAR FUNCIÓN ALEATORIA
            const fn = funciones9M[Math.floor(Math.random() * funciones9M.length)];
            const result = fn();
            document.getElementById('visor').textContent = result.toFixed(0);
            
            // 4. SHAKE EFFECT
            document.body.style.animation = 'none';
            setTimeout(() => {
                document.body.style.animation = 'shake 0.1s';
            }, 10);
            
            updateUI();
            log(`EXPLOSIÓN #${explosiones} → ${result.toFixed(0)}`);
        }
        
        // ✨ PARTICULA MEJORADA
        function createParticle(x, y, color, vx, vy) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.background = color;
            p.style.width = p.style.height = (4 + Math.random()*8) + 'px';
            document.body.appendChild(p);
            
            // FÍSICA REAL
            let vxReal = vx || (Math.random()-0.5)*400;
            let vyReal = vy || (Math.random()-0.5)*400;
            let life = 1;
            
            const tick = () => {
                const rect = p.getBoundingClientRect();
                p.style.left = rect.left + vxReal * 0.016 + 'px';
                p.style.top = rect.top + vyReal * 0.016 + 'px';
                p.style.transform = `scale(${life})`;
                vxReal *= 0.98; vyReal *= 0.98; // FRICTION
                life -= 0.02;
                
                if(life > 0) requestAnimationFrame(tick);
                else p.remove();
            };
            tick();
        }
        
        // 🎯 INICIALIZAR 9M FUNCIONES
        function init9M() {
            funciones9M = [];
            for(let i = 0; i < 900000; i++) { // Optimizado
                funciones9M.push(() => {
                    return (Math.sin(i * 0.0001 + Date.now() * 0.001) * 5000 + 10000) | 0;
                });
            }
            log('✅ 9M líneas cargadas - ¡LISTO PARA EXPLOTAR!');
            updateUI();
        }
        
        // 💣 MEGA BLAST
        window.megaExplosion = () => {
            for(let i = 0; i < 200; i++) {
                setTimeout(() => {
                    explosionImpact(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight
                    );
                }, i * 20);
            }
            log('💣 MEGA EXPLOSIÓN ACTIVADA!');
        };
        
        // 🌈 RAINBOW WAVE
        window.rainbowWave = () => {
            const cells = document.querySelectorAll('.grid-cell');
            let hue = 0;
            const wave = setInterval(() => {
                cells.forEach((cell, i) => {
                    if(i % 5 === 0) {
                        cell.style.background = `hsl(${hue}, 100%, 50%)`;
                        setTimeout(() => cell.style.background = '', 300);
                    }
                });
                hue += 10;
                if(hue > 360) clearInterval(wave);
            }, 80);
            log('🌈 Rainbow wave!');
        };
        
        // 😈 CHAOS MODE
        window.chaosMode = () => {
            chaosActive = !chaosActive;
            log(chaosActive ? '😈 CHAOS MODE ON' : '✅ Chaos OFF');
        };
        
        // CSS SHAKE
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
        
        // 💾 DOWNLOAD
        window.descargarStats = () => {
            const stats = { explosiones, funciones9M: funciones9M.length, totalLineas: 9000000 };
            const blob = new Blob([JSON.stringify(stats, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `explosiones_${explosiones}.json`;
            a.click();
        };
        
        // INIT
        init9M();
        log('💥 EXPLOSIÓN INTERACTIVA LISTA');
        log('🖱️  CLICK CUALQUIER LUGAR = EXPLOTA TODO');
        
        // CHAOS LOOP
        setInterval(() => {
            if(chaosActive && Math.random() < 0.3) {
                explosionImpact(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
            }
        }, 200);
    </script>
</body>
</html>
